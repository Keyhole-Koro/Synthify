syntax = "proto3";

package synthify.graph.v1;

option go_package = "github.com/Keyhole-Koro/SynthifyShared/gen/synthify/graph/v1;graphv1";

// Core graph data types shared across graph, node, and related services.

message Node {
  string id = 1;
  string document_id = 2;
  string label = 3;
  int32 level = 4;
  NodeEntityType entity_type = 5;
  string description = 6;
  string summary_html = 7;
  string source_chunk_id = 8;
  double confidence = 9;
  string created_at = 10;
  string canonical_node_id = 11;
  GraphProjectionScope scope = 12;
}

message Edge {
  string id = 1;
  string source = 2;
  string target = 3;
  string type = 4;
  GraphProjectionScope scope = 5;
  string description = 6;
  string created_at = 7;
}

message Graph {
  string workspace_id = 1;
  string document_id = 2;
  repeated Node nodes = 3;
  repeated Edge edges = 4;
  bool cross_document = 5;
}

enum NodeEntityType {
  NODE_ENTITY_TYPE_UNSPECIFIED = 0;
  NODE_ENTITY_TYPE_ORGANIZATION = 1;
  NODE_ENTITY_TYPE_PERSON = 2;
  NODE_ENTITY_TYPE_METRIC = 3;
  NODE_ENTITY_TYPE_DATE = 4;
  NODE_ENTITY_TYPE_LOCATION = 5;
}

enum GraphProjectionScope {
  GRAPH_PROJECTION_SCOPE_UNSPECIFIED = 0;
  GRAPH_PROJECTION_SCOPE_DOCUMENT = 1;
  GRAPH_PROJECTION_SCOPE_CANONICAL = 2;
}
