syntax = "proto3";

package synthify.tree.v1;

option go_package = "github.com/Keyhole-Koro/SynthifyShared/gen/synthify/tree/v1;treev1";

// MonitoringService は dev ロールを持つ管理者のみアクセス可能
service MonitoringService {
  rpc GetPipelineStats(GetPipelineStatsRequest) returns (GetPipelineStatsResponse);
  rpc GetExtractionStats(GetExtractionStatsRequest) returns (GetExtractionStatsResponse);
  rpc GetEvaluationTrend(GetEvaluationTrendRequest) returns (GetEvaluationTrendResponse);
  rpc ListFailedDocuments(ListFailedDocumentsRequest) returns (ListFailedDocumentsResponse);
  rpc GetNormalizationStats(GetNormalizationStatsRequest) returns (GetNormalizationStatsResponse);
  rpc GetAliasStats(GetAliasStatsRequest) returns (GetAliasStatsResponse);
}

message GetPipelineStatsRequest {
  string since = 1; // ISO 8601 日付（省略時: 過去30日）
}

message StageLatency {
  string stage = 1;
  double avg_sec = 2;
  double p95_sec = 3;
}

message GetPipelineStatsResponse {
  repeated StageLatency stage_latencies = 1;
  int32 completed_count = 2;
  int32 failed_count = 3;
  int32 total_llm_calls = 4;
  double total_cost_usd = 5;
}

message GetExtractionStatsRequest {
  string document_id = 1; // 省略時は全ドキュメント集計
}

message GetExtractionStatsResponse {
  map<string, int32> items_by_level = 1;    // "0" -> 3, "1" -> 12, ...
  int32 synthesized_item_count = 2;
  int32 reviewed_item_count = 4;
}

message WeeklyMetric {
  string week = 1; // "2026-W12"
  double precision = 2;
  double recall = 3;
  map<string, double> level_accuracy = 4; // "0" -> 0.95, ...
}

message GetEvaluationTrendRequest {
  int32 weeks = 1; // 取得週数（デフォルト: 8）
}

message GetEvaluationTrendResponse {
  repeated WeeklyMetric metrics = 1;
}

message FailedDocument {
  string document_id = 1;
  string filename = 2;
  string error_stage = 3;
  string error_message = 4;
  string failed_at = 5;
}

message ListFailedDocumentsRequest {
  string since = 1;
  int32 limit = 2;
}

message ListFailedDocumentsResponse {
  repeated FailedDocument documents = 1;
}

message GetNormalizationStatsRequest {
  string since = 1; // ISO 8601 日付（省略時: 過去30日）
}

message NormalizationToolStat {
  string tool_id = 1;
  string problem_pattern = 2;
  int32 applied_count = 3;
  int32 auto_approved_count = 4;
  int32 manual_approved_count = 5;
  int32 rejected_count = 6;
}

message GetNormalizationStatsResponse {
  int32 total_runs = 1;
  int32 auto_approved_count = 2;
  int32 manual_approved_count = 3;
  int32 rejected_count = 4;
  int32 pending_count = 5;
  repeated NormalizationToolStat tool_stats = 6;
}

message GetAliasStatsRequest {
  string workspace_id = 1; // 省略時は全 workspace 集計
}

message GetAliasStatsResponse {
  int32 suggested_count = 1;   // 自動候補（未レビュー）
  int32 approved_count = 2;    // 承認済み
  int32 rejected_count = 3;    // 却下
  double avg_similarity_score = 4;
  int32 canonical_item_count = 5;
}
