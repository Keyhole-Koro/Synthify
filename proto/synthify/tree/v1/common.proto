syntax = "proto3";

package synthify.tree.v1;

option go_package = "github.com/Keyhole-Koro/SynthifyShared/gen/synthify/tree/v1;treev1";

// Shared primitive used across multiple domains.
message DocumentChunk {
  string document_id = 1;
  string chunk_id = 2;
  int64 chunk_index = 3;
  string text = 4;
  string source_filename = 5;
  int64 source_page = 6;
  int64 source_offset_start = 7;
  int64 source_offset_end = 8;
}
