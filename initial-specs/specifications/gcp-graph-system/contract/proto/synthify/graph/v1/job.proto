syntax = "proto3";

package synthify.graph.v1;

option go_package = "github.com/synthify/backend/gen/synthify/graph/v1;graphv1";

service JobService {
  rpc GetJobStatus(GetJobStatusRequest) returns (GetJobStatusResponse);
}

message Job {
  string job_id = 1;
  string document_id = 2;
  JobType type = 3;
  JobLifecycleState status = 4;
  string created_at = 5;
  string started_at = 6;
  string completed_at = 7;
  string error_message = 8;
}

enum JobType {
  JOB_TYPE_UNSPECIFIED = 0;
  JOB_TYPE_PROCESS_DOCUMENT = 1;
  JOB_TYPE_REPROCESS_DOCUMENT = 2;
}

enum JobLifecycleState {
  JOB_LIFECYCLE_STATE_UNSPECIFIED = 0;
  JOB_LIFECYCLE_STATE_QUEUED = 1;
  JOB_LIFECYCLE_STATE_RUNNING = 2;
  JOB_LIFECYCLE_STATE_SUCCEEDED = 3;
  JOB_LIFECYCLE_STATE_FAILED = 4;
}

message GetJobStatusRequest {
  string job_id = 1;
}

message GetJobStatusResponse {
  Job job = 1;
}
