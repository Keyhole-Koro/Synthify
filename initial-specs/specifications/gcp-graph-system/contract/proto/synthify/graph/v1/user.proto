syntax = "proto3";

package synthify.graph.v1;

option go_package = "github.com/synthify/backend/gen/synthify/graph/v1;graphv1";

service UserService {
  // Firebase Auth ログイン後にフロントから呼ぶ
  // 初回ログイン時はユーザーレコードを作成し、2回目以降は last_login_at を更新する
  rpc SyncUser(SyncUserRequest) returns (SyncUserResponse);
  rpc GetMe(GetMeRequest) returns (GetMeResponse);
}

message User {
  string user_id = 1;
  string email = 2;
  string display_name = 3;
  string created_at = 4;
  string last_login_at = 5;
}

message SyncUserRequest {}  // ID トークンはヘッダで渡す

message SyncUserResponse {
  User user = 1;
  bool is_new_user = 2;
}

message GetMeRequest {}

message GetMeResponse {
  User user = 1;
  repeated string workspace_ids = 2;
}
