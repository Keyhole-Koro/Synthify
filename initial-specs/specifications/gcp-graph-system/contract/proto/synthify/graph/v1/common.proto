syntax = "proto3";

package synthify.graph.v1;

option go_package = "github.com/synthify/backend/gen/synthify/graph/v1;graphv1";

// Shared primitive used across multiple domains.
message DocumentChunk {
  string document_id = 1;
  string chunk_id = 2;
  int64 chunk_index = 3;
  string text = 4;
  string source_filename = 5;
  int64 source_page = 6;
  int64 source_offset_start = 7;
  int64 source_offset_end = 8;
}
