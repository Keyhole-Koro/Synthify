syntax = "proto3";

package synthify.graph.v1;

option go_package = "github.com/synthify/backend/gen/synthify/graph/v1;graphv1";

import "synthify/graph/v1/common.proto";
import "synthify/graph/v1/graph_types.proto";

service NodeService {
  rpc GetGraphEntityDetail(GetGraphEntityDetailRequest) returns (GetGraphEntityDetailResponse);
  // ユーザーがノードを開いた記録を保存する（viewer 以上）
  rpc RecordNodeView(RecordNodeViewRequest) returns (RecordNodeViewResponse);
  // ユーザーが手動でノードを追加する（editor / owner のみ）
  rpc CreateNode(CreateNodeRequest) returns (CreateNodeResponse);
  // ユーザーごとの閲覧・追加ノード一覧を取得する（workspace メンバー全員が参照可能）
  rpc GetUserNodeActivity(GetUserNodeActivityRequest) returns (GetUserNodeActivityResponse);
  // is_dev=true のメンバーのみ。suggested エイリアス候補を承認する
  rpc ApproveAlias(ApproveAliasRequest) returns (ApproveAliasResponse);
  // is_dev=true のメンバーのみ。suggested エイリアス候補を却下する
  rpc RejectAlias(RejectAliasRequest) returns (RejectAliasResponse);
}

message EntityRef {
  string workspace_id = 1;
  GraphProjectionScope scope = 2;
  string id = 3;
  string document_id = 4;
}

message GraphEntityEvidence {
  repeated DocumentChunk source_chunks = 1;
  repeated string source_document_ids = 2;
}

message GraphEntityDetail {
  EntityRef ref = 1;
  Node node = 2;
  GraphEntityEvidence evidence = 3;
  repeated Node representative_nodes = 4;
}

message GetGraphEntityDetailRequest {
  EntityRef target_ref = 1;
  bool resolve_aliases = 2;
}

message GetGraphEntityDetailResponse {
  GraphEntityDetail detail = 1;
}

message RecordNodeViewRequest {
  string workspace_id = 1;
  string node_id = 2;
  string document_id = 3;
}

message RecordNodeViewResponse {}

message CreateNodeRequest {
  string workspace_id = 1;
  string document_id = 2;   // 関連づける document（必須）
  string label = 3;
  string category = 4;      // NodeCategory enum 値
  int32 level = 5;          // 0〜3
  string description = 6;
  string parent_node_id = 7; // hierarchical 親ノード（省略可）
}

message CreateNodeResponse {
  Node node = 1;
}

message ViewedNodeEntry {
  string node_id = 1;
  string document_id = 2;
  string label = 3;
  string last_viewed_at = 4;
  int64 view_count = 5;
}

message CreatedNodeEntry {
  string node_id = 1;
  string document_id = 2;
  string label = 3;
  string created_at = 4;
}

message UserNodeActivity {
  string user_id = 1;
  string display_name = 2;
  repeated ViewedNodeEntry viewed_nodes = 3;
  repeated CreatedNodeEntry created_nodes = 4;
}

message GetUserNodeActivityRequest {
  string workspace_id = 1;
  string user_id = 2;       // 省略時は自分自身
  string document_id = 3;   // 省略時は workspace 全体
  int32 limit = 4;          // viewed_nodes / created_nodes それぞれの上限（デフォルト 50）
}

message GetUserNodeActivityResponse {
  UserNodeActivity activity = 1;
}

message ApproveAliasRequest {
  string workspace_id = 1;
  string canonical_node_id = 2;
  string alias_node_id = 3;
}

message ApproveAliasResponse {
  string canonical_node_id = 1;
  string alias_node_id = 2;
  string merge_status = 3; // "approved"
}

message RejectAliasRequest {
  string workspace_id = 1;
  string canonical_node_id = 2;
  string alias_node_id = 3;
}

message RejectAliasResponse {
  string canonical_node_id = 1;
  string alias_node_id = 2;
  string merge_status = 3; // "rejected"
}
