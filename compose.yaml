name: synthify-dev

services:
  frontend:
    image: oven/bun:1
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    working_dir: /workspace/web
    command: >
      bash -c '
        set -e;
        if [ ! -f package.json ]; then
          echo "web/package.json not found. Waiting for web implementation...";
          sleep infinity;
        fi;
        if [ ! -x node_modules/.bin/next ]; then
          bun install --frozen-lockfile;
        fi;
        rm -rf .next;
        bun run dev
      '
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:${BACKEND_PORT:-8080}}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-demo-api-key}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-demo-synthify}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-demo-synthify.firebaseapp.com}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-demo-synthify.appspot.com}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-1234567890}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-1:1234567890:web:demo-synthify}
      NEXT_PUBLIC_FIREBASE_AUTH_EMULATOR_URL: ${NEXT_PUBLIC_FIREBASE_AUTH_EMULATOR_URL:-http://127.0.0.1:${FIREBASE_AUTH_PORT:-9099}}
      NEXT_PUBLIC_FIREBASE_FIRESTORE_EMULATOR_HOST: ${NEXT_PUBLIC_FIREBASE_FIRESTORE_EMULATOR_HOST:-127.0.0.1}
      NEXT_PUBLIC_FIREBASE_FIRESTORE_EMULATOR_PORT: ${NEXT_PUBLIC_FIREBASE_FIRESTORE_EMULATOR_PORT:-${FIREBASE_FIRESTORE_PORT:-8282}}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://backend:8080}
      WATCHPACK_POLLING: "true"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - .:/workspace
    depends_on:
      - backend

  backend:
    image: golang:1.25-bookworm
    working_dir: /workspace
    command: >
      bash -c '
        if [ ! -f go.mod ]; then
          echo "go.mod not found. Waiting for Go implementation...";
          sleep infinity;
        fi;
        go run ./api/cmd/server
      '
    environment:
      SERVICE_MODE: api
      PATH: /usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      ENV: local
      PORT: "8080"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      GCP_PROJECT_ID: synthify-local
      GCS_BUCKET: synthify-uploads
      GCS_EMULATOR_HOST: http://gcs:4443
      STORAGE_EMULATOR_HOST: http://gcs:4443
      GCS_UPLOAD_URL_BASE: ${GCS_UPLOAD_URL_BASE:-http://localhost:4443/synthify-uploads}
      INTERNAL_GCS_UPLOAD_URL_BASE: ${INTERNAL_GCS_UPLOAD_URL_BASE:-http://gcs:4443/synthify-uploads}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-demo-synthify}
      FIREBASE_AUTH_EMULATOR_HOST: firebase-auth:9099
      FIRESTORE_EMULATOR_HOST: firebase-auth:8282
      DATABASE_URL: postgres://synthify:synthify@postgres:5432/synthify?sslmode=disable
      WORKER_BASE_URL: ${WORKER_BASE_URL:-http://worker:8081}
      INTERNAL_WORKER_TOKEN: ${INTERNAL_WORKER_TOKEN:-dev-worker-token}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.0-flash}
      GEMINI_CACHE_ENABLED: "true"
      GEMINI_CACHE_DIR: /workspace/.gemini-cache
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - .:/workspace
      - go-pkg-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      - gemini-cache:/workspace/.gemini-cache
    depends_on:
      - postgres
      - gcs
      - firebase-auth
      - worker

  worker:
    image: golang:1.25-bookworm
    working_dir: /workspace
    command: >
      bash -c '
        if [ ! -f go.mod ]; then
          echo "go.mod not found. Waiting for Go implementation...";
          sleep infinity;
        fi;
        go run ./worker/cmd/server
      '
    environment:
      SERVICE_MODE: worker
      PATH: /usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      ENV: local
      PORT: "8081"
      GCP_PROJECT_ID: synthify-local
      GCS_BUCKET: synthify-uploads
      GCS_EMULATOR_HOST: http://gcs:4443
      STORAGE_EMULATOR_HOST: http://gcs:4443
      GCS_UPLOAD_URL_BASE: ${GCS_UPLOAD_URL_BASE:-http://localhost:4443/synthify-uploads}
      INTERNAL_GCS_UPLOAD_URL_BASE: ${INTERNAL_GCS_UPLOAD_URL_BASE:-http://gcs:4443/synthify-uploads}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-demo-synthify}
      FIREBASE_AUTH_EMULATOR_HOST: firebase-auth:9099
      FIRESTORE_EMULATOR_HOST: firebase-auth:8282
      DATABASE_URL: postgres://synthify:synthify@postgres:5432/synthify?sslmode=disable
      INTERNAL_WORKER_TOKEN: ${INTERNAL_WORKER_TOKEN:-dev-worker-token}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.0-flash}
      GEMINI_CACHE_ENABLED: "true"
      GEMINI_CACHE_DIR: /workspace/.gemini-cache
    ports:
      - "${WORKER_PORT:-8081}:8081"
    volumes:
      - .:/workspace
      - go-pkg-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      - gemini-cache:/workspace/.gemini-cache
    depends_on:
      - postgres
      - gcs
      - firebase-auth

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: synthify
      POSTGRES_USER: synthify
      POSTGRES_PASSWORD: synthify
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro

  gcs:
    image: fsouza/fake-gcs-server:1.52
    command:
      - -scheme
      - http
      - -port
      - "4443"
      - -public-host
      - gcs:4443
      - -external-url
      - http://localhost:4443
    ports:
      - "${GCS_PORT:-4443}:4443"
    volumes:
      - gcs-data:/data

  firebase-auth:
    image: oven/bun:1
    working_dir: /workspace
    command: >
      bash -c '
        apt-get update &&
        DEBIAN_FRONTEND=noninteractive apt-get install -y openjdk-21-jre-headless &&
        bunx firebase-tools@13 emulators:start --only auth,firestore --project demo-synthify
      '
    environment:
      FIRESTORE_EMULATOR_HOST: 0.0.0.0:8282
    ports:
      - "${FIREBASE_AUTH_PORT:-9099}:9099"
      - "${FIREBASE_FIRESTORE_PORT:-8282}:8282"
    volumes:
      - .:/workspace

volumes:
  go-pkg-cache:
  go-build-cache:
  postgres-data:
  gcs-data:
  gemini-cache:
