name: synthify-dev

services:
  frontend:
    image: oven/bun:1
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    working_dir: /workspace/apps/web
    command: >
      bash -c '
        set -e;
        if [ ! -f /workspace/apps/web/package.json ]; then
          echo "apps/web/package.json not found. Waiting for web implementation...";
          sleep infinity;
        fi;
        if [ ! -x /workspace/node_modules/.bin/next ]; then
          cd /workspace;
          bun install --frozen-lockfile;
        fi;
        cd /workspace/apps/web;
        rm -rf .next;
        bun run dev
      '
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:${BACKEND_PORT:-8080}}
      NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-demo-api-key}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-demo-synthify}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-demo-synthify.firebaseapp.com}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:-demo-synthify.appspot.com}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID:-1234567890}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-1:1234567890:web:demo-synthify}
      NEXT_PUBLIC_FIREBASE_AUTH_EMULATOR_URL: ${NEXT_PUBLIC_FIREBASE_AUTH_EMULATOR_URL:-http://127.0.0.1:${FIREBASE_AUTH_PORT:-9099}}
      NEXT_PUBLIC_FIREBASE_FIRESTORE_EMULATOR_HOST: ${NEXT_PUBLIC_FIREBASE_FIRESTORE_EMULATOR_HOST:-127.0.0.1}
      NEXT_PUBLIC_FIREBASE_FIRESTORE_EMULATOR_PORT: ${NEXT_PUBLIC_FIREBASE_FIRESTORE_EMULATOR_PORT:-${FIREBASE_FIRESTORE_PORT:-8282}}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://host.docker.internal:${BACKEND_PORT:-8080}}
      WATCHPACK_POLLING: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - .:/workspace
    depends_on:
      - backend

  backend:
    image: golang:1.25-bookworm
    network_mode: host
    working_dir: /workspace
    command: >
      bash -c '
        if [ ! -f go.mod ]; then
          echo "go.mod not found. Waiting for Go implementation...";
          sleep infinity;
        fi;
        go build -buildvcs=false -o /tmp/synthify-api ./apps/api/cmd/server &&
        exec /tmp/synthify-api
      '
    environment:
      SERVICE_MODE: api
      PATH: /usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      ENV: local
      PORT: "8080"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      GCP_PROJECT_ID: synthify-local
      GCS_BUCKET: synthify-uploads
      GCS_EMULATOR_HOST: http://127.0.0.1:${GCS_PORT:-4443}
      STORAGE_EMULATOR_HOST: http://127.0.0.1:${GCS_PORT:-4443}
      GCS_UPLOAD_URL_BASE: ${GCS_UPLOAD_URL_BASE:-http://localhost:4443/storage/v1/b/synthify-uploads/o}
      INTERNAL_GCS_UPLOAD_URL_BASE: ${INTERNAL_GCS_UPLOAD_URL_BASE:-http://127.0.0.1:${GCS_PORT:-4443}/storage/v1/b/synthify-uploads/o}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-demo-synthify}
      FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:${FIREBASE_AUTH_PORT:-9099}
      FIRESTORE_EMULATOR_HOST: 127.0.0.1:${FIREBASE_FIRESTORE_PORT:-8282}
      DATABASE_URL: postgres://synthify:synthify@127.0.0.1:${POSTGRES_PORT:-5432}/synthify?sslmode=disable
      WORKER_BASE_URL: ${WORKER_BASE_URL:-http://127.0.0.1:${WORKER_PORT:-8081}}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3-flash-preview}
      GEMINI_CACHE_ENABLED: "true"
      GEMINI_CACHE_DIR: /workspace/.gemini-cache
    volumes:
      - .:/workspace
      - go-pkg-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      - gemini-cache:/workspace/.gemini-cache
    depends_on:
      postgres:
        condition: service_healthy
      gcs:
        condition: service_started
      firebase-auth:
        condition: service_started
      worker:
        condition: service_started

  worker:
    image: golang:1.25-bookworm
    network_mode: host
    working_dir: /workspace
    command: >
      bash -c '
        if [ ! -f go.mod ]; then
          echo "go.mod not found. Waiting for Go implementation...";
          sleep infinity;
        fi;
        go build -buildvcs=false -o /tmp/synthify-worker ./apps/worker/cmd/server &&
        exec /tmp/synthify-worker
      '
    environment:
      SERVICE_MODE: worker
      PATH: /usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      ENV: local
      PORT: "8081"
      GCP_PROJECT_ID: synthify-local
      GCS_BUCKET: synthify-uploads
      GCS_EMULATOR_HOST: http://127.0.0.1:${GCS_PORT:-4443}
      STORAGE_EMULATOR_HOST: http://127.0.0.1:${GCS_PORT:-4443}
      GCS_UPLOAD_URL_BASE: ${GCS_UPLOAD_URL_BASE:-http://localhost:4443/storage/v1/b/synthify-uploads/o}
      INTERNAL_GCS_UPLOAD_URL_BASE: ${INTERNAL_GCS_UPLOAD_URL_BASE:-http://127.0.0.1:${GCS_PORT:-4443}/storage/v1/b/synthify-uploads/o}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-demo-synthify}
      FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:${FIREBASE_AUTH_PORT:-9099}
      FIRESTORE_EMULATOR_HOST: 127.0.0.1:${FIREBASE_FIRESTORE_PORT:-8282}
      DATABASE_URL: postgres://synthify:synthify@127.0.0.1:${POSTGRES_PORT:-5432}/synthify?sslmode=disable
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3-flash-preview}
      GEMINI_CACHE_ENABLED: "true"
      GEMINI_CACHE_DIR: /workspace/.gemini-cache
    volumes:
      - .:/workspace
      - go-pkg-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      - gemini-cache:/workspace/.gemini-cache
    depends_on:
      postgres:
        condition: service_healthy
      gcs:
        condition: service_started
      firebase-auth:
        condition: service_started

  log-viewer:
    image: oven/bun:1
    user: "${LOCAL_UID:-1000}:${LOCAL_GID:-1000}"
    working_dir: /workspace/apps/log-viewer/ui
    command: >
      bash -c '
        set -e;
        if [ ! -x /workspace/node_modules/.bin/next ]; then
          cd /workspace;
          bun install --frozen-lockfile;
        fi;
        cd /workspace/apps/log-viewer/ui;
        bun run dev
      '
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:${BACKEND_PORT:-8080}}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://host.docker.internal:${BACKEND_PORT:-8080}}
    ports:
      - "127.0.0.1:${LOG_VIEWER_PORT:-5174}:5174"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/workspace
    depends_on:
      - backend

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: synthify
      POSTGRES_USER: synthify
      POSTGRES_PASSWORD: synthify
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synthify -d synthify"]
      interval: 5s
      timeout: 5s
      retries: 10

  gcs:
    image: fsouza/fake-gcs-server:1.52
    command:
      - -scheme
      - http
      - -port
      - "4443"
      - -public-host
      - gcs:4443
      - -external-url
      - http://localhost:4443
    ports:
      - "${GCS_PORT:-4443}:4443"
    volumes:
      - gcs-data:/data

  firebase-auth:
    build:
      context: ./docker/firebase-emulator
    working_dir: /workspace
    command: firebase emulators:start --only auth,firestore --project demo-synthify
    environment:
      FIRESTORE_EMULATOR_HOST: 0.0.0.0:8282
    ports:
      - "${FIREBASE_AUTH_PORT:-9099}:9099"
      - "${FIREBASE_FIRESTORE_PORT:-8282}:8282"
    volumes:
      - .:/workspace

volumes:
  go-pkg-cache:
  go-build-cache:
  postgres-data:
  gcs-data:
  gemini-cache:
