version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "db/init/001_schema.sql"
    queries:
      - "db/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "shared/repository/postgres/sqlcgen"
        sql_package: "database/sql"
        overrides:
          - column: "document_chunks.embedding"
            go_type:
              import: "github.com/pgvector/pgvector-go"
              package: "pgvector"
              type: "Vector"
            nullable: true
